{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h3>Search Results for "{{ query }}"</h3>

    {% if products %}
        <div class="row">
            {% for product in products %}
                <div class="col-md-4">
                    <div class="card mb-3">
                        <img src="{{ product.image_url }}" class="card-img-top">
                        <div class="card-body">
                            <h5>{{ product.name }}</h5>
                            <p>₹ {{ product.price }}</p>
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
    {% else %}
        <p>No products found.</p>
    {% endif %}
</div>
{% endblock %}
